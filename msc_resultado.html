<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSC — Seu Resultado</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --coral:#FF6B6B;--violet:#7C3AED;--indigo:#4F46E5;--teal:#0EA5E9;
  --green:#10B981;--amber:#F59E0B;--dark:#0C0C18;
  --surface:rgba(255,255,255,.04);--surface2:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#F2F2FF;--muted:rgba(242,242,255,.5);--muted2:rgba(242,242,255,.28);
}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);
  min-height:100vh;overflow-x:hidden}
.mesh{position:fixed;inset:0;z-index:0;pointer-events:none;background:
  radial-gradient(ellipse 60% 40% at 10% 20%,rgba(124,58,237,.12) 0%,transparent 55%),
  radial-gradient(ellipse 50% 50% at 90% 80%,rgba(255,107,107,.08) 0%,transparent 55%)}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 28px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(12,12,24,.85);backdrop-filter:blur(20px);border-bottom:.5px solid var(--border)}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.3px;
  background:linear-gradient(135deg,#fff 30%,rgba(255,255,255,.5));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
.nav-logo span{background:linear-gradient(135deg,var(--coral),var(--violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-new{font-size:12px;color:var(--muted);text-decoration:none;
  display:flex;align-items:center;gap:6px;transition:color .2s}
.nav-new:hover{color:var(--text)}

.wrap{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:88px 20px 120px}

/* HERO */
.hero-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted2);margin-bottom:8px}
.hero-name{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(26px,5vw,38px);
  line-height:1.1;margin-bottom:6px;
  background:linear-gradient(135deg,#fff,rgba(255,255,255,.7));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:24px;max-width:500px}

/* SCORE CARD */
.score-card{background:linear-gradient(135deg,rgba(30,28,50,.9),rgba(20,18,40,.95));
  border:.5px solid var(--border2);border-radius:20px;padding:24px;margin-bottom:14px;
  position:relative;overflow:hidden}
.score-card::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;
  border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,.15),transparent 70%);pointer-events:none}
.score-top{display:flex;align-items:center;gap:22px;margin-bottom:22px;flex-wrap:wrap}
.score-ring{position:relative;width:88px;height:88px;flex-shrink:0}
.score-ring svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(255,255,255,.07);stroke-width:6}
.ring-fill{fill:none;stroke-width:6;stroke-linecap:round;
  stroke:url(#rg);stroke-dasharray:220;stroke-dashoffset:220;
  transition:stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1)}
.score-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Syne',sans-serif;font-weight:800;font-size:22px;
  background:linear-gradient(135deg,var(--coral),var(--violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.score-info{flex:1;min-width:160px}
.level-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;border-radius:20px;padding:4px 12px;
  margin-bottom:8px}
.score-title{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;margin-bottom:4px}
.score-desc{font-size:12.5px;color:var(--muted);line-height:1.5}
.score-bars{display:flex;flex-direction:column;gap:9px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{font-size:11.5px;color:var(--muted);width:148px;flex-shrink:0}
.bar-track{flex:1;height:5px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width 1.2s cubic-bezier(.4,0,.2,1);width:0}
.bar-val{font-size:11.5px;font-weight:600;width:30px;text-align:right;flex-shrink:0}

/* SECTION */
.sec{margin-bottom:14px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;
  display:flex;align-items:center;gap:8px}
.sec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.lock-tag{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
  color:var(--muted2);display:flex;align-items:center;gap:5px}

/* INSIGHT OPEN */
.insight-open{background:linear-gradient(135deg,rgba(16,185,129,.08),rgba(14,165,233,.05));
  border:.5px solid rgba(16,185,129,.2);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.insight-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--green);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.insight-text{font-size:13px;color:var(--muted);line-height:1.6}
.insight-text strong{color:var(--text);font-weight:500}

/* LOCKED ITEMS */
.locked-list{display:flex;flex-direction:column;gap:7px}
.locked-item{display:flex;align-items:center;gap:12px;padding:12px 14px;
  border-radius:10px;background:rgba(255,255,255,.02);border:.5px solid rgba(255,255,255,.05);
  cursor:pointer;transition:all .2s}
.locked-item:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1)}
.li-icon{font-size:16px;opacity:.4;flex-shrink:0}
.li-text{flex:1}
.li-title{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:2px}
.li-sub{font-size:11px;color:var(--muted2)}
.li-lock{font-size:12px;opacity:.3}

/* PAYWALL */
.paywall{background:linear-gradient(135deg,rgba(28,26,48,.95),rgba(124,58,237,.06));
  border:.5px solid rgba(124,58,237,.3);border-radius:20px;padding:26px;
  margin-top:14px;position:relative;overflow:hidden}
.paywall::before{content:'';position:absolute;top:-80px;right:-80px;width:220px;height:220px;
  border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,.12),transparent 70%);pointer-events:none}
.pw-badge{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  background:linear-gradient(135deg,rgba(255,107,107,.12),rgba(124,58,237,.08));
  border:.5px solid rgba(255,107,107,.25);border-radius:20px;padding:4px 12px;
  color:var(--coral);margin-bottom:10px}
.pw-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;
  margin-bottom:18px;flex-wrap:wrap}
.pw-title{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;line-height:1.2;margin-bottom:6px}
.pw-sub{font-size:13px;color:var(--muted);line-height:1.6}
.pw-price-wrap{text-align:right;flex-shrink:0}
.pw-old{font-size:13px;color:var(--muted2);text-decoration:line-through;margin-bottom:2px}
.pw-price{font-family:'Syne',sans-serif;font-weight:800;font-size:30px;
  background:linear-gradient(135deg,var(--coral),var(--violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pw-price span{font-size:14px}
.pw-period{font-size:11px;color:var(--muted2)}
.pw-items{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:18px}
.pw-item{display:flex;align-items:flex-start;gap:7px;font-size:12px;color:var(--muted);line-height:1.4}
.pw-check{width:16px;height:16px;border-radius:50%;flex-shrink:0;margin-top:1px;
  background:linear-gradient(135deg,var(--coral),var(--violet));
  display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff}
.cta-btn{width:100%;padding:15px;border-radius:12px;border:none;cursor:pointer;
  font-family:'Syne',sans-serif;font-weight:700;font-size:15px;
  background:linear-gradient(135deg,var(--coral),var(--violet));color:#fff;
  box-shadow:0 8px 28px rgba(124,58,237,.3);transition:transform .15s,box-shadow .15s;
  position:relative;overflow:hidden}
.cta-btn::after{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.12),transparent);pointer-events:none}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(124,58,237,.4)}
.cta-sub{display:flex;align-items:center;justify-content:center;gap:16px;
  margin-top:10px;flex-wrap:wrap}
.cta-sub-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted2)}

/* TIMER & SOCIAL */
.timer-bar{background:rgba(245,158,11,.07);border:.5px solid rgba(245,158,11,.18);
  border-radius:8px;padding:9px 14px;display:flex;align-items:center;
  justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.timer-left{font-size:12px;color:var(--amber);display:flex;align-items:center;gap:6px;font-weight:500}
.timer-num{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;
  background:linear-gradient(135deg,var(--amber),var(--coral));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.social-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.avatars{display:flex}
.av{width:26px;height:26px;border-radius:50%;border:2px solid var(--dark);
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;
  margin-left:-6px}
.av:first-child{margin-left:0}
.social-text{font-size:12px;color:var(--muted)}
.social-text strong{color:var(--text)}

/* DEMO BANNER */
.demo-banner{background:rgba(245,158,11,.08);border:.5px solid rgba(245,158,11,.2);
  border-radius:10px;padding:10px 14px;margin-bottom:16px;
  font-size:12px;color:var(--amber);line-height:1.5;text-align:center}
.demo-banner a{color:var(--amber);font-weight:600}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .5s ease both}
@media(max-width:560px){.pw-items{grid-template-columns:1fr}.pw-top{flex-direction:column}.pw-price-wrap{text-align:left}}
</style>
</head>
<body>
<div class="mesh"></div>

<nav>
  <a href="msc_landing_page.html" class="nav-logo">M<span>SC</span></a>
  <a href="msc_upload.html" class="nav-new">+ Nova análise</a>
</nav>

<div class="wrap" id="resultWrap">
  <!-- conteúdo gerado pelo JS -->
</div>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
</svg>

<script>
// ── DADOS DE DEMONSTRAÇÃO ────────────────────────────────────────────────────
const DEMO = {
  nome: 'Carlos Mendes',
  cargo_atual: 'Analista de Marketing',
  score_total: 68,
  nivel: 'Prata',
  scores: {
    clareza_estrutura: 80,
    comunicacao_impacto: 58,
    aderencia_tecnica: 72,
    branding_pessoal: 55,
    atualizacao: 66,
    posicionamento: 60
  },
  insight_aberto: 'Suas experiências descrevem responsabilidades, não resultados — isso te elimina em 73% dos processos seletivos antes de um humano ver seu perfil.',
  resumo_livre: 'Profissional com trajetória sólida e progressão clara de carreira. O currículo tem boa estrutura mas perde força na comunicação de impacto e no posicionamento estratégico.',
  bloqueios: [
    { titulo: 'Ausência de métricas', descricao: 'Suas experiências listam tarefas mas não mostram resultados concretos. Recrutadores precisam ver números para avaliar seu impacto real.' },
    { titulo: 'Posicionamento genérico', descricao: 'Seu headline não comunica claramente quem você é e o que você entrega de diferente. Isso gera ambiguidade na triagem automática.' }
  ],
  plano_acao: [
    { periodo: 'Dias 1–30', titulo: 'Adicione métricas às experiências', descricao: 'Reescreva as 3 experiências principais incluindo resultados mensuráveis e impacto real no negócio.' },
    { periodo: 'Dias 31–60', titulo: 'Reescreva seu headline', descricao: 'Crie um headline que comunique cargo-alvo, especialidade e diferencial em uma única linha clara.' },
    { periodo: 'Dias 61–90', titulo: 'Atualize seu LinkedIn', descricao: 'Espelhe as mudanças do currículo no LinkedIn e adicione uma seção de destaque com suas principais entregas.' }
  ],
  frase_posicionamento: 'Especialista em marketing digital com foco em performance e crescimento. Nos últimos 5 anos, liderei campanhas que geraram resultados mensuráveis para empresas de médio e grande porte. Agora busco um ambiente onde estratégia e execução andem juntos.',
  pontos_fortes: ['Progressão de carreira clara e consistente', 'Boa estrutura e legibilidade do documento', 'Experiência relevante para o cargo-alvo'],
  percentil: 61
};

// ── CARREGAR DADOS ─────────────────────────────────────────────────────────
let data = null;
let isDemo = false;
try {
  const saved = sessionStorage.getItem('msc_result');
  if (saved) {
    data = JSON.parse(saved);
  }
} catch(e) {}

if (!data) {
  data = DEMO;
  isDemo = true;
}

// ── HELPERS ────────────────────────────────────────────────────────────────
function levelStyle(nivel) {
  const map = {
    'Bronze': { bg: 'rgba(180,120,50,.15)', border: 'rgba(180,120,50,.3)', color: '#CD853F' },
    'Prata':  { bg: 'rgba(160,160,180,.15)', border: 'rgba(160,160,180,.3)', color: '#C0C0D0' },
    'Ouro':   { bg: 'rgba(245,158,11,.15)', border: 'rgba(245,158,11,.3)', color: '#F59E0B' },
    'Platina':{ bg: 'rgba(124,58,237,.15)', border: 'rgba(124,58,237,.3)', color: '#a78bfa' },
  };
  return map[nivel] || map['Prata'];
}

function barColor(val) {
  if (val >= 75) return 'linear-gradient(90deg,#10B981,#0EA5E9)';
  if (val >= 55) return 'linear-gradient(90deg,#F59E0B,#FF6B6B)';
  return 'linear-gradient(90deg,#FF6B6B,#7C3AED)';
}

function timerStr(secs) {
  const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60), s = secs%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ── RENDER ─────────────────────────────────────────────────────────────────
const lvStyle = levelStyle(data.nivel);
const sc = data.scores;

const scoreLabels = {
  clareza_estrutura: 'Clareza e estrutura',
  comunicacao_impacto: 'Comunicação de impacto',
  aderencia_tecnica: 'Aderência técnica',
  branding_pessoal: 'Branding pessoal',
  atualizacao: 'Atualização profissional',
  posicionamento: 'Posicionamento'
};

const scoreColors = {
  clareza_estrutura: 'linear-gradient(90deg,#7C3AED,#4F46E5)',
  comunicacao_impacto: 'linear-gradient(90deg,#FF6B6B,#F59E0B)',
  aderencia_tecnica: 'linear-gradient(90deg,#0EA5E9,#10B981)',
  branding_pessoal: 'linear-gradient(90deg,#F59E0B,#FF6B6B)',
  atualizacao: 'linear-gradient(90deg,#10B981,#0EA5E9)',
  posicionamento: 'linear-gradient(90deg,#7C3AED,#FF6B6B)'
};

const barsHTML = Object.entries(sc).map(([k,v]) => `
  <div class="bar-row">
    <div class="bar-label">${scoreLabels[k]||k}</div>
    <div class="bar-track"><div class="bar-fill" data-w="${v}" style="background:${scoreColors[k]||barColor(v)}"></div></div>
    <div class="bar-val" style="color:${v>=75?'#10B981':v>=55?'#F59E0B':'#FF6B6B'}">${v}</div>
  </div>`).join('');

document.getElementById('resultWrap').innerHTML = `
${isDemo ? `<div class="demo-banner anim">
  ⚡ Esta é uma análise de demonstração. <a href="msc_upload.html">Envie seu currículo</a> para ver seu diagnóstico real.
</div>` : ''}

<div class="anim" style="margin-bottom:24px">
  <div class="hero-label">Seu diagnóstico está pronto</div>
  <div class="hero-name">${data.nome},<br>aqui está o seu mapa.</div>
  <div class="hero-sub">Analisamos seu currículo em 6 dimensões. Parte do resultado está disponível agora — o restante está bloqueado abaixo.</div>
</div>

<!-- SCORE CARD -->
<div class="score-card anim" style="animation-delay:.08s">
  <div class="score-top">
    <div class="score-ring">
      <svg width="88" height="88" viewBox="0 0 88 88">
        <circle class="ring-bg" cx="44" cy="44" r="35"/>
        <circle class="ring-fill" id="ringFill" cx="44" cy="44" r="35"/>
      </svg>
      <div class="score-num" id="scoreNum">${data.score_total}</div>
    </div>
    <div class="score-info">
      <div class="level-badge" style="background:${lvStyle.bg};border:.5px solid ${lvStyle.border};color:${lvStyle.color}">◆ Nível ${data.nivel}</div>
      <div class="score-title">Você está acima de ${data.percentil}% dos perfis</div>
      <div class="score-desc">${data.resumo_livre}</div>
    </div>
  </div>
  <div class="score-bars">${barsHTML}</div>
</div>

<!-- INSIGHT ABERTO -->
<div class="sec anim" style="animation-delay:.12s">
  <div class="sec-head">
    <div class="sec-title"><div class="sec-dot" style="background:linear-gradient(135deg,#10B981,#0EA5E9)"></div>Diagnóstico de carreira</div>
    <div class="lock-tag">🔒 parcialmente bloqueado</div>
  </div>
  <div class="insight-open">
    <div class="insight-label">✦ Insight desbloqueado</div>
    <div class="insight-text">${data.insight_aberto}</div>
  </div>
  <div class="insight-open" style="margin-top:8px;background:linear-gradient(135deg,rgba(245,158,11,.08),rgba(255,107,107,.05));border-color:rgba(245,158,11,.2)">
    <div class="insight-label" style="color:var(--amber)">✦ Como os robôs ATS veem seu currículo</div>
    <div class="insight-text">${data.analise_ats || 'Análise desbloqueada no diagnóstico completo.'}</div>
  </div>
  <div class="locked-list" style="margin-top:10px">
    <div class="locked-item" onclick="scrollToPaywall()">
      <div class="li-icon">🧱</div>
      <div class="li-text">
        <div class="li-title">Bloqueio #1: <span style="color:var(--coral)">${data.bloqueios?.[0]?.titulo || 'identificado'}</span></div>
        <div class="li-sub">Desbloqueie para ver a explicação completa e como corrigir</div>
      </div>
      <div class="li-lock">🔒</div>
    </div>
    <div class="locked-item" onclick="scrollToPaywall()">
      <div class="li-icon">🧱</div>
      <div class="li-text">
        <div class="li-title">Bloqueio #2: <span style="color:var(--coral)">${data.bloqueios?.[1]?.titulo || 'identificado'}</span></div>
        <div class="li-sub">Desbloqueie para ver a explicação completa e como corrigir</div>
      </div>
      <div class="li-lock">🔒</div>
    </div>
    <div class="locked-item" onclick="scrollToPaywall()">
      <div class="li-icon">🗺️</div>
      <div class="li-text">
        <div class="li-title">Plano de ação detalhado — do dia 1 ao dia 60</div>
        <div class="li-sub">Instruções específicas para o seu perfil, não genéricas</div>
      </div>
      <div class="li-lock">🔒</div>
    </div>
    <div class="locked-item" onclick="scrollToPaywall()">
      <div class="li-icon">💡</div>
      <div class="li-text">
        <div class="li-title">Headline sugerido para seu currículo e LinkedIn</div>
        <div class="li-sub">Gerado especificamente para o seu perfil e cargo-alvo</div>
      </div>
      <div class="li-lock">🔒</div>
    </div>
    <div class="locked-item" onclick="scrollToPaywall()">
      <div class="li-icon">✍️</div>
      <div class="li-text">
        <div class="li-title">Frase de posicionamento completa</div>
        <div class="li-sub">3-4 linhas prontas para copiar no LinkedIn — do seu perfil real</div>
      </div>
      <div class="li-lock">🔒</div>
    </div>
    <div class="locked-item" onclick="scrollToPaywall()">
      <div class="li-icon">📊</div>
      <div class="li-text">
        <div class="li-title">Como você está vs. o mercado — gap competitivo</div>
        <div class="li-sub">O que perfis similares têm que este currículo não tem</div>
      </div>
      <div class="li-lock">🔒</div>
    </div>

    <div class="locked-item" onclick="scrollToPaywall()">
      <div class="li-icon">📄</div>
      <div class="li-text">
        <div class="li-title">Relatório completo em PDF para baixar</div>
        <div class="li-sub">Guarda e usa como guia durante toda sua busca</div>
      </div>
      <div class="li-lock">🔒</div>
    </div>
  </div>
</div>

<!-- SCORE PARCIAL ABERTO -->

// ── ANIMAR SCORE RING ──────────────────────────────────────────────────────
window.addEventListener('load', () => {
  setTimeout(() => {
    const ring = document.getElementById('ringFill');
    if (!ring) return;
    const r = 35, circ = 2 * Math.PI * r;
    const offset = circ - (data.score_total / 100) * circ;
    ring.style.strokeDasharray = circ;
    ring.style.strokeDashoffset = circ;
    setTimeout(() => { ring.style.strokeDashoffset = offset; }, 100);
  }, 200);

  // Animar barras
  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  }, 400);
});

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSC — Diagnóstico Completo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --coral:#FF6B6B;--violet:#7C3AED;--indigo:#4F46E5;--teal:#0EA5E9;
  --green:#10B981;--amber:#F59E0B;--dark:#0C0C18;
  --surface:rgba(255,255,255,.04);--surface2:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#F2F2FF;--muted:rgba(242,242,255,.5);--muted2:rgba(242,242,255,.28);
}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);
  min-height:100vh;overflow-x:hidden}
.mesh{position:fixed;inset:0;z-index:0;pointer-events:none;background:
  radial-gradient(ellipse 60% 40% at 10% 20%,rgba(124,58,237,.1) 0%,transparent 55%),
  radial-gradient(ellipse 50% 50% at 90% 80%,rgba(16,185,129,.06) 0%,transparent 55%)}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 28px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(12,12,24,.9);backdrop-filter:blur(20px);border-bottom:.5px solid var(--border)}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.3px;
  background:linear-gradient(135deg,#fff 30%,rgba(255,255,255,.5));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
.nav-logo span{background:linear-gradient(135deg,var(--coral),var(--violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-badge{font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;
  background:rgba(16,185,129,.1);border:.5px solid rgba(16,185,129,.25);color:var(--green)}
.btn-pdf{font-size:12px;font-weight:600;padding:8px 16px;border-radius:8px;border:none;
  cursor:pointer;background:linear-gradient(135deg,var(--coral),var(--violet));
  color:#fff;transition:transform .15s,opacity .2s;display:flex;align-items:center;gap:6px}
.btn-pdf:hover{transform:translateY(-1px);opacity:.9}

.wrap{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:88px 20px 80px}

/* VERIFICATION SCREEN */
.verify-screen{text-align:center;padding:80px 24px;display:none}
.verify-screen.active{display:block}
.verify-spin{width:56px;height:56px;border-radius:50%;border:2px solid rgba(124,58,237,.2);
  border-top-color:var(--violet);animation:spin .8s linear infinite;margin:0 auto 20px}
.verify-title{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;margin-bottom:8px}
.verify-sub{font-size:14px;color:var(--muted);line-height:1.6}

/* ACCESS DENIED */
.denied-screen{text-align:center;padding:80px 24px;display:none}
.denied-screen.active{display:block}
.denied-icon{font-size:48px;margin-bottom:16px}
.denied-title{font-family:'Syne',sans-serif;font-weight:700;font-size:22px;margin-bottom:8px}
.denied-sub{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:24px;max-width:400px;margin-left:auto;margin-right:auto}

/* MAIN CONTENT */
.main-content{display:none}
.main-content.active{display:block}

/* HERO */
.paid-hero{margin-bottom:28px;animation:fadeUp .5s ease both}
.paid-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  background:rgba(16,185,129,.1);border:.5px solid rgba(16,185,129,.25);
  border-radius:20px;padding:5px 14px;color:var(--green);margin-bottom:12px}
.paid-name{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(24px,4vw,36px);
  line-height:1.1;margin-bottom:6px;
  background:linear-gradient(135deg,#fff,rgba(255,255,255,.7));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.paid-sub{font-size:14px;color:var(--muted);line-height:1.6;max-width:520px}

/* SCORE CARD */
.score-card{background:linear-gradient(135deg,rgba(28,26,48,.95),rgba(18,16,38,.98));
  border:.5px solid var(--border2);border-radius:20px;padding:24px;margin-bottom:14px;
  position:relative;overflow:hidden;animation:fadeUp .5s .06s ease both}
.score-card::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;
  border-radius:50%;background:radial-gradient(circle,rgba(16,185,129,.1),transparent 70%);pointer-events:none}
.score-top{display:flex;align-items:center;gap:22px;margin-bottom:22px;flex-wrap:wrap}
.score-ring{position:relative;width:88px;height:88px;flex-shrink:0}
.score-ring svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(255,255,255,.07);stroke-width:6}
.ring-fill{fill:none;stroke-width:6;stroke-linecap:round;stroke:url(#rg);
  stroke-dasharray:220;stroke-dashoffset:220;transition:stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1)}
.score-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Syne',sans-serif;font-weight:800;font-size:22px;
  background:linear-gradient(135deg,var(--green),var(--teal));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.score-info{flex:1;min-width:160px}
.level-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;
  letter-spacing:.06em;border-radius:20px;padding:4px 12px;margin-bottom:8px}
.score-title{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;margin-bottom:4px}
.score-desc{font-size:12.5px;color:var(--muted);line-height:1.5}
.bars{display:flex;flex-direction:column;gap:9px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{font-size:11.5px;color:var(--muted);width:148px;flex-shrink:0}
.bar-track{flex:1;height:5px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width 1.2s cubic-bezier(.4,0,.2,1);width:0}
.bar-val{font-size:11.5px;font-weight:600;width:30px;text-align:right;flex-shrink:0}

/* SECTION BLOCKS */
.block{background:var(--surface);border:.5px solid var(--border);border-radius:16px;
  padding:20px;margin-bottom:12px;animation:fadeUp .5s ease both}
.block-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;
  padding-bottom:12px;border-bottom:.5px solid var(--border)}
.block-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:16px;flex-shrink:0}
.block-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px}
.block-sub{font-size:11.5px;color:var(--muted);margin-top:2px}

/* INSIGHT FULL */
.insight-full{background:linear-gradient(135deg,rgba(16,185,129,.08),rgba(14,165,233,.05));
  border:.5px solid rgba(16,185,129,.2);border-radius:12px;padding:16px;margin-bottom:10px}
.insight-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--green);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.insight-text{font-size:13.5px;color:var(--muted);line-height:1.7}
.insight-text strong{color:var(--text);font-weight:500}

/* BLOQUEIOS */
.bloqueio{background:linear-gradient(135deg,rgba(255,107,107,.06),rgba(124,58,237,.04));
  border:.5px solid rgba(255,107,107,.15);border-radius:12px;padding:14px 16px;margin-bottom:8px}
.bloq-num{display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;background:rgba(255,107,107,.15);
  color:var(--coral);font-size:11px;font-weight:700;flex-shrink:0;margin-bottom:6px}
.bloq-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;margin-bottom:6px;color:var(--text)}
.bloq-desc{font-size:13px;color:var(--muted);line-height:1.6}

/* PLANO */
.plano-item{display:grid;grid-template-columns:80px 1fr;gap:14px;padding:14px 0;
  border-bottom:.5px solid var(--border)}
.plano-item:last-child{border-bottom:none;padding-bottom:0}
.plano-periodo{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:5px 8px;border-radius:6px;text-align:center;line-height:1.3;margin-top:2px;flex-shrink:0}
.p1{background:rgba(124,58,237,.12);color:#a78bfa}
.p2{background:rgba(14,165,233,.12);color:#7dd3fc}
.p3{background:rgba(16,185,129,.12);color:#6ee7b7}
.plano-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;margin-bottom:4px}
.plano-desc{font-size:13px;color:var(--muted);line-height:1.6}

/* FRASE */
.frase-box{background:linear-gradient(135deg,rgba(79,70,229,.08),rgba(124,58,237,.05));
  border:.5px solid rgba(124,58,237,.2);border-radius:12px;padding:20px;
  border-left:3px solid var(--violet);position:relative}
.frase-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:#a78bfa;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.frase-text{font-size:15px;color:var(--text);line-height:1.7;font-style:italic}
.copy-btn{position:absolute;top:14px;right:14px;background:rgba(124,58,237,.15);
  border:.5px solid rgba(124,58,237,.25);border-radius:6px;padding:5px 10px;
  font-size:11px;font-weight:600;color:#a78bfa;cursor:pointer;transition:all .2s}
.copy-btn:hover{background:rgba(124,58,237,.25)}
.copy-btn.copied{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.25);color:var(--green)}

/* PONTOS FORTES */
.forte-list{display:flex;flex-direction:column;gap:8px}
.forte-item{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--muted);line-height:1.5}
.forte-check{width:20px;height:20px;border-radius:50%;background:rgba(16,185,129,.15);
  display:flex;align-items:center;justify-content:center;font-size:10px;
  color:var(--green);flex-shrink:0;margin-top:1px}

/* PDF SECTION */
.pdf-section{background:linear-gradient(135deg,rgba(245,158,11,.06),rgba(255,107,107,.04));
  border:.5px solid rgba(245,158,11,.2);border-radius:16px;padding:22px;
  margin-top:14px;animation:fadeUp .5s .3s ease both;text-align:center}
.pdf-icon{font-size:40px;margin-bottom:12px}
.pdf-title{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;margin-bottom:6px}
.pdf-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:18px;max-width:400px;margin-left:auto;margin-right:auto}
.btn-download{display:inline-flex;align-items:center;gap:10px;
  font-family:'Syne',sans-serif;font-weight:700;font-size:15px;
  padding:15px 32px;border-radius:12px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--amber),var(--coral));color:#fff;
  box-shadow:0 8px 28px rgba(245,158,11,.25);transition:transform .15s,box-shadow .15s;
  text-decoration:none}
.btn-download:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(245,158,11,.35)}
.pdf-hint{font-size:11.5px;color:var(--muted2);margin-top:10px}

/* NEXT STEPS */
.next-card{background:var(--surface);border:.5px solid var(--border);
  border-radius:12px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;
  margin-bottom:8px;transition:border-color .2s}
.next-card:hover{border-color:var(--border2)}
.next-num{width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,var(--coral),var(--violet));
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;flex-shrink:0;margin-top:1px}
.next-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.next-desc{font-size:12px;color:var(--muted);line-height:1.5}

/* BTN SECONDARY */
.btn-sec{display:inline-flex;align-items:center;gap:8px;
  font-size:13px;font-weight:600;padding:10px 20px;border-radius:10px;
  background:var(--surface2);border:.5px solid var(--border2);
  color:var(--muted);cursor:pointer;transition:all .2s;text-decoration:none}
.btn-sec:hover{background:rgba(255,255,255,.1);color:var(--text)}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:560px){.bar-label{width:110px}.plano-item{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="mesh"></div>

<nav>
  <a href="msc_landing_page.html" class="nav-logo">M<span>SC</span></a>
  <div class="nav-right">
    <div class="nav-badge">✓ Acesso liberado</div>
    <button class="btn-pdf" onclick="downloadPDF()">⬇ Baixar PDF</button>
  </div>
</nav>

<div class="wrap">
  <!-- VERIFICAÇÃO -->
  <div class="verify-screen active" id="verifyScreen">
    <div class="verify-spin"></div>
    <div class="verify-title" id="verifyTitle">Confirmando seu pagamento…</div>
    <div class="verify-sub" id="verifySub">Estamos carregando seu diagnóstico completo. Isso pode levar alguns segundos.</div>
  </div>

  <!-- ACESSO NEGADO -->
  <div class="denied-screen" id="deniedScreen">
    <div class="denied-icon">🔒</div>
    <div class="denied-title">Acesso não autorizado</div>
    <div class="denied-sub">Este diagnóstico completo é exclusivo para quem desbloqueou. Se você já pagou, verifique o link enviado por email.</div>
    <a href="msc_resultado.html" class="btn-sec">← Ver resultado gratuito</a>
  </div>

  <!-- CONTEÚDO PAGO -->
  <div class="main-content" id="mainContent"></div>
</div>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
</svg>

<!-- jsPDF para geração do PDF no browser -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
// ══════════════════════════════════════════════════════════════════════════
// CONFIGURAÇÃO — preencha com seus dados do Supabase
// ══════════════════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://jggjkmutsydjzyxxkcpj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_2hk6Nl4uuUeCzWENAq5NZA_89-k5fPm';

// ══════════════════════════════════════════════════════════════════════════
// DADOS DE DEMONSTRAÇÃO (usados quando token=demo na URL)
// ══════════════════════════════════════════════════════════════════════════
const DEMO_DATA = {
  nome: 'Carlos Mendes',
  cargo_atual: 'Analista de Marketing Sênior',
  score_total: 68,
  nivel: 'Prata',
  scores: {
    clareza_estrutura: 80, comunicacao_impacto: 58,
    aderencia_tecnica: 72, branding_pessoal: 55,
    atualizacao: 66, posicionamento: 60
  },
  insight_aberto: 'Suas experiências descrevem responsabilidades, não resultados — isso te elimina em 73% dos processos seletivos.',
  resumo_livre: 'Profissional com trajetória sólida e progressão clara. O currículo tem boa estrutura mas perde força na comunicação de impacto e posicionamento.',
  bloqueios: [
    { titulo: 'Ausência de métricas nas experiências', descricao: 'Você descreve o que fazia, não o que gerou. Frases como "responsável por campanhas" não comunicam valor. O recrutador precisa de números: quantos leads, quanto crescimento, qual impacto financeiro. Sem isso, seu currículo parece igual ao de todos.' },
    { titulo: 'Headline genérico sem diferenciação', descricao: 'Seu título atual não comunica especialidade nem cargo-alvo com clareza. Em processos com dezenas de candidatos, quem não se posiciona claramente é descartado na triagem automática antes de qualquer humano ver o perfil.' }
  ],
  plano_acao: [
    { periodo: 'Dias 1–30', titulo: 'Reescreva suas 3 experiências principais com métricas', descricao: 'Para cada cargo, adicione pelo menos uma métrica real: percentual de crescimento, volume gerenciado, número de clientes, economia gerada. Se não tiver o número exato, estime com honestidade. Um número aproximado convence mais do que nenhum.' },
    { periodo: 'Dias 31–60', titulo: 'Construa um headline que vende sua especialidade', descricao: 'Formato: [Cargo-alvo] | [Especialidade] | [Diferencial]. Exemplo: "Analista de Marketing | Performance e Growth | 5 anos em B2B SaaS". Use o mesmo headline no LinkedIn e no currículo — consistência aumenta credibilidade.' },
    { periodo: 'Dias 61–90', titulo: 'Atualize LinkedIn e aplique para 5 vagas por semana', descricao: 'Com o currículo ajustado, espelhe tudo no LinkedIn. Ative o modo "Open to Work" para recrutadores. Aplique consistentemente — 5 vagas por semana com currículo otimizado gera muito mais retorno do que 20 vagas com currículo genérico.' }
  ],
  frase_posicionamento: 'Especialista em marketing digital com foco em performance e crescimento de receita. Nos últimos 5 anos, conduzi estratégias que combinaram dados e criatividade para gerar resultados mensuráveis em empresas de médio e grande porte. Agora busco um ambiente onde posso liderar a agenda de marketing e transformar estratégia em resultado.',
  pontos_fortes: [
    'Progressão de carreira clara e consistente ao longo dos anos',
    'Boa estrutura visual — currículo é fácil de ler em 6 segundos',
    'Experiência diretamente relevante para o cargo-alvo informado',
    'Variedade de contextos (B2B e B2C) que demonstra adaptabilidade'
  ],
  percentil: 61
};

// ══════════════════════════════════════════════════════════════════════════
// VERIFICAÇÃO DE ACESSO
// ══════════════════════════════════════════════════════════════════════════
let resultData = null;

async function verifyAccess() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  const email = params.get('email');

  // Modo demo
  if (token === 'demo') {
    resultData = DEMO_DATA;
    showContent(true);
    return;
  }

  // Busca por email (vindo do redirecionamento do Kiwify)
  if (email) {
    try {
      // Aguarda até 10 segundos para o webhook processar
      for (let i = 0; i < 5; i++) {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/pagamentos?email=eq.${encodeURIComponent(email)}&status=eq.pago&select=resultado&order=criado_em.desc&limit=1`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
        );
        const rows = await res.json();
        if (rows && rows.length > 0 && rows[0].resultado) {
          resultData = rows[0].resultado;
          showContent(false);
          return;
        }
        // Aguarda 2 segundos antes de tentar novamente
        await new Promise(r => setTimeout(r, 2000));
      }

      // Webhook pode ter atrasado — busca resultado pendente pelo email
      const res2 = await fetch(
        `${SUPABASE_URL}/rest/v1/pagamentos?email=eq.${encodeURIComponent(email)}&select=resultado&order=criado_em.desc&limit=1`,
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
      );
      const rows2 = await res2.json();
      if (rows2 && rows2.length > 0 && rows2[0].resultado) {
        resultData = rows2[0].resultado;
        showContent(false);
        return;
      }
    } catch(e) {
      console.warn('Supabase error:', e);
    }

    // Fallback — sessionStorage
    const local = sessionStorage.getItem('msc_result');
    if (local) {
      try { resultData = JSON.parse(local); showContent(false); return; } catch(e) {}
    }

    // Último recurso — demo com aviso
    resultData = DEMO_DATA;
    showContent(true);
    return;
  }

  // Busca por token
  if (token) {
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/pagamentos?token=eq.${token}&status=eq.pago&select=resultado`,
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
      );
      const rows = await res.json();
      if (rows && rows.length > 0 && rows[0].resultado) {
        resultData = rows[0].resultado;
        showContent(false);
        return;
      }
    } catch(e) {}
    showDenied();
    return;
  }

  // Sem token e sem email — tenta sessionStorage
  const local = sessionStorage.getItem('msc_result');
  if (local) {
    try { resultData = JSON.parse(local); showContent(false); return; } catch(e) {}
  }

  showDenied();
}

function showDenied() {
  document.getElementById('verifyScreen').classList.remove('active');
  document.getElementById('deniedScreen').classList.add('active');
}

function showContent(isDemo) {
  document.getElementById('verifyScreen').classList.remove('active');
  renderContent(isDemo);
  document.getElementById('mainContent').classList.add('active');
}

// ══════════════════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════════════════
function levelStyle(n) {
  return {
    'Bronze':  { bg:'rgba(180,120,50,.15)', border:'rgba(180,120,50,.3)', color:'#CD853F' },
    'Prata':   { bg:'rgba(160,160,180,.15)', border:'rgba(160,160,180,.3)', color:'#C0C0D0' },
    'Ouro':    { bg:'rgba(245,158,11,.15)', border:'rgba(245,158,11,.3)', color:'#F59E0B' },
    'Platina': { bg:'rgba(124,58,237,.15)', border:'rgba(124,58,237,.3)', color:'#a78bfa' },

// COPIAR FRASE

function copyFrase() {
  const txt = resultData?.frase_posicionamento || '';
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.getElementById('copyBtn');
    if (btn) { btn.textContent = '✓ Copiado!'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 2500); }
  });
}

// GERAR PDF
// ══════════════════════════════════════════════════════════════════════════
function downloadPDF() {
  if (!resultData) return;
  const d = resultData;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  const W = 210, M = 18;
  let y = 0;

  function newPage() { doc.addPage(); y = 22; }
  function checkY(need) { if (y + need > 272) newPage(); }

  function heading(text, color) {
    checkY(12);
    doc.setFont('helvetica','bold');
    doc.setFontSize(8);
    doc.setTextColor(...color);
    doc.text(text.toUpperCase(), M, y);
    y += 6;
  }

  function title(text) {
    checkY(10);
    doc.setFont('helvetica','bold');
    doc.setFontSize(16);
    doc.setTextColor(242,242,255);
    doc.text(text, M, y);
    y += 9;
  }

  function body(text, color=[160,160,190]) {
    checkY(6);
    doc.setFont('helvetica','normal');
    doc.setFontSize(9.5);
    doc.setTextColor(...color);
    const lines = doc.splitTextToSize(String(text || ''), W - 2*M);
    lines.forEach(l => { checkY(5); doc.text(l, M, y); y += 5; });
    y += 2;
  }

  function bold(text, color=[242,242,255]) {
    checkY(6);
    doc.setFont('helvetica','bold');
    doc.setFontSize(10);
    doc.setTextColor(...color);
    const lines = doc.splitTextToSize(String(text || ''), W - 2*M);
    lines.forEach(l => { checkY(5); doc.text(l, M, y); y += 5.5; });
  }

  function divider() {
    checkY(4);
    doc.setDrawColor(40,40,60);
    doc.line(M, y, W-M, y);
    y += 6;
  }

  function scoreBar(label, val) {
    checkY(12);
    const barW = W - 2*M - 35;
    const col = val>=75?[16,185,129]:val>=55?[245,158,11]:[255,107,107];
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(160,160,190);
    doc.text(label, M, y+3);
    doc.setFillColor(35,35,55);
    doc.roundedRect(M+70, y-1, barW, 5, 2, 2, 'F');
    doc.setFillColor(...col);
    doc.roundedRect(M+70, y-1, barW*(val/100), 5, 2, 2, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...col);
    doc.text(String(val)+'/100', W-M, y+3, {align:'right'});
    y += 11;
  }

  function infoBox(title, text, bgColor, borderColor) {
    checkY(20);
    const lines = doc.splitTextToSize(String(text || ''), W - 2*M - 8);
    const h = lines.length * 5 + 14;
    doc.setFillColor(...bgColor);
    doc.roundedRect(M, y, W-2*M, h, 4, 4, 'F');
    doc.setDrawColor(...borderColor);
    doc.line(M, y, M, y+h);
    doc.line(M+1, y, M+1, y+h);
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...borderColor);
    doc.text(title, M+5, y+7);
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(180,180,210);
    lines.forEach((l,i) => doc.text(l, M+5, y+13+i*5));
    y += h + 6;
  }

  // ── CAPA ─────────────────────────────────────────────────────────────
  doc.setFillColor(12,12,24);
  doc.rect(0,0,W,297,'F');
  doc.setFillColor(124,58,237,0.2);
  doc.ellipse(W+10, 30, 80, 80, 'F');
  doc.setFillColor(255,107,107,0.1);
  doc.ellipse(-10, 260, 70, 70, 'F');

  y = 38;
  doc.setFont('helvetica','bold'); doc.setFontSize(8);
  doc.setTextColor(160,100,255);
  doc.text('DIAGNÓSTICO COMPLETO DE CARREIRA', M, y); y += 14;

  doc.setFont('helvetica','bold'); doc.setFontSize(30);
  doc.setTextColor(242,242,255);
  const nome = (d.nome || 'Candidato').split(' ')[0];
  doc.text(nome + ',', M, y); y += 10;
  doc.setFont('helvetica','bold'); doc.setFontSize(20);
  doc.setTextColor(200,180,255);
  doc.text('aqui está tudo.', M, y); y += 14;

  doc.setFont('helvetica','normal'); doc.setFontSize(11);
  doc.setTextColor(120,120,160);
  doc.text(d.cargo_atual || '', M, y); y += 6;
  doc.setFont('helvetica','normal'); doc.setFontSize(9);
  doc.setTextColor(80,80,110);
  doc.text('Diagnóstico gerado por MSC — Mapeando Sua Carreira', M, y);

  // Score na capa
  y = 185;
  doc.setFillColor(22,20,42);
  doc.roundedRect(M, y, W-2*M, 62, 6, 6, 'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(44);
  doc.setTextColor(255,107,107);
  doc.text(String(d.score_total || 0), M+10, y+32);
  doc.setFont('helvetica','bold'); doc.setFontSize(12);
  doc.setTextColor(200,180,255);
  doc.text('Nível ' + (d.nivel || 'Prata'), M+10, y+44);
  doc.setFont('helvetica','normal'); doc.setFontSize(9);
  doc.setTextColor(100,100,140);
  doc.text('Você está acima de ' + (d.percentil||60) + '% dos perfis na sua área', M+10, y+55);

  // ── PÁG 2: SCORE COMPLETO ────────────────────────────────────────────
  newPage();
  doc.setFillColor(12,12,24); doc.rect(0,0,W,297,'F');

  heading('Análise do Currículo — Score em 6 Dimensões', [160,100,255]);
  title('Resultado detalhado');
  body(d.resumo_livre);
  divider();

  const sc = d.scores || {};
  const labels = {
    clareza_estrutura:'Clareza e estrutura',

  // ── PÁG 4: PONTOS FORTES + DADOS PESSOAIS ───────────────────────────

  doc.setFillColor(12,12,24); doc.rect(0,0,W,297,'F');

  heading('Pontos Fortes', [100,230,180]);

    doc.setFont('helvetica','normal'); doc.setFontSize(9.5);

    doc.text('✓', M, y+1);

  divider();

  if (d.dados_pessoais) {

    bold('Foto:', [245,180,100]);
    body(d.dados_pessoais.foto);
    bold('Dados a remover ou revisar:', [255,150,150]);
    body(d.dados_pessoais.informacoes_desnecessarias);
    bold('Recomendações:', [100,230,180]);

  // ── PÁG 5: COMPARAÇÃO COM MERCADO ───────────────────────────────────
  if (d.comparacao_mercado) {
    checkY(60);
    if (y > 100) { newPage(); doc.setFillColor(12,12,24); doc.rect(0,0,W,297,'F'); }

    heading('Comparação com o Mercado', [160,100,255]);
    title('Como você está em relação a perfis similares');

    infoBox('O que perfis similares costumam ter',
      d.comparacao_mercado.o_que_falta || '',
      [20,15,40], [160,100,255]);

    infoBox('Seu diferencial real',
      d.comparacao_mercado.diferencial_real || 'Nenhum diferencial claro identificado.',
      [12,35,25], [100,230,180]);

    infoBox('Principal gap competitivo',
      d.comparacao_mercado.gap_principal || '',

  }

  // ── PÁG 6: PLANO DE AÇÃO + FRASE ────────────────────────────────────
  newPage();
  doc.setFillColor(12,12,24); doc.rect(0,0,W,297,'F');

  heading('Plano de Ação', [100,200,255]);
  title('Do Dia 1 ao Dia 60');

  const periodColors = [[160,100,255],[100,200,255],[100,230,180]];
  (d.plano_acao||[]).forEach((p,i) => {
    checkY(35);
    const col = periodColors[i] || [160,160,200];
    doc.setFont('helvetica','bold'); doc.setFontSize(8);
    doc.setTextColor(...col);
    doc.text(p.periodo.toUpperCase(), M, y); y += 6;
    bold(p.titulo, [242,242,255]);
    body(p.descricao);
    y += 3;
  });

  divider();

  heading('Frase de Posicionamento', [160,100,255]);
  title('Pronta para usar no LinkedIn');
  checkY(35);
  const frLines = doc.splitTextToSize('"' + (d.frase_posicionamento||'') + '"', W-2*M-8);
  const frH = frLines.length * 5 + 14;
  doc.setFillColor(20,15,40);
  doc.roundedRect(M, y, W-2*M, frH, 4, 4, 'F');
  doc.setDrawColor(124,58,237);
  doc.line(M, y, M, y+frH); doc.line(M+1, y, M+1, y+frH);
  doc.setFont('helvetica','italic'); doc.setFontSize(9.5); doc.setTextColor(180,160,255);
  frLines.forEach((l,i) => doc.text(l, M+5, y+9+i*5));
  y += frH + 8;

  // ── RODAPÉ EM TODAS AS PÁGINAS ───────────────────────────────────────
  const total = doc.getNumberOfPages();
  for (let i=1; i<=total; i++) {
    doc.setPage(i);
    doc.setFillColor(18,16,32);
    doc.rect(0,285,W,12,'F');
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5);
    doc.setTextColor(60,60,90);
    doc.text('MSC — Mapeando Sua Carreira · Diagnóstico Completo de Carreira', M, 291);
    doc.text('Pág. '+i+'/'+total, W-M, 291, {align:'right'});
  }

  const filename = 'MSC_Diagnostico_' + (d.nome||'Candidato').replace(/\s+/g,'_') + '.pdf';
  doc.save(filename);
}

function copyHeadline() {
  const el = document.getElementById('headlineText');
  if (!el) return;
  const txt = el.textContent.replace(/['"«»]/g, '').trim();
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.getElementById('copyHeadlineBtn');
    if (btn) {
      btn.textContent = '✓ Copiado!';
      btn.style.background = 'rgba(16,185,129,.15)';
      btn.style.borderColor = 'rgba(16,185,129,.25)';
      btn.style.color = 'var(--green)';
      setTimeout(() => {
        btn.textContent = 'Copiar';
        btn.style.background = 'rgba(14,165,233,.15)';
        btn.style.borderColor = 'rgba(14,165,233,.25)';
        btn.style.color = 'var(--teal)';
      }, 2500);
    }
  }).catch(() => {
    // Fallback para browsers sem clipboard API
    const range = document.createRange();
    range.selectNode(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
    window.getSelection().removeAllRanges();
    const btn = document.getElementById('copyHeadlineBtn');
    if (btn) { btn.textContent = '✓ Copiado!'; setTimeout(() => btn.textContent = 'Copiar', 2500); }
  });
}

async function enviarEmail() {
  const email = document.getElementById('emailReenvio')?.value;
  if (!email || !email.includes('@')) {
    showEmailMsg('Por favor, informe um email válido.', 'error'); return;
  }
  if (!resultData) {
    showEmailMsg('Nenhum resultado disponível.', 'error'); return;
  }

  const btn = document.querySelector('[onclick="enviarEmail()"]');
  if (btn) { btn.textContent = 'Enviando...'; btn.disabled = true; }

  try {
    // Gera PDF em base64 para anexar no email
    const { jsPDF } = window.jspdf;
    const pdfBase64 = await getPDFBase64();

    // Salva no Supabase
    await fetch(SUPABASE_URL + '/rest/v1/pagamentos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ token: crypto.randomUUID(), email, status: 'pago', resultado: resultData })
    });

    // Envia email com PDF anexado
    const res = await fetch('/api/send-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email,
        nome: resultData.nome,
        pdfBase64,
        score: resultData.score_total,
        nivel: resultData.nivel
      })
    });

    if (res.ok) {
      showEmailMsg('✓ Email enviado com sucesso! Verifique sua caixa de entrada (e spam).', 'success');
    } else {
      // Email falhou mas salvou no Supabase — mostra link de reacesso
      const link = 'https://msc-carreira.vercel.app/msc_resultado_pago.html?email=' + encodeURIComponent(email);
      showEmailMsg('✓ Salvo! Acesse novamente pelo link: <a href="' + link + '" style="color:#0EA5E9">' + link + '</a>', 'success');
    }
  } catch(e) {
    showEmailMsg('Erro ao enviar. Tente novamente.', 'error');
  } finally {
    if (btn) { btn.textContent = 'Enviar para meu email →'; btn.disabled = false; }
  }
}

function showEmailMsg(html, type) {
  const wrap = document.getElementById('emailReenvio')?.closest('.block');
  if (!wrap) return;
  let el = document.getElementById('emailMsg');
  if (!el) {
    el = document.createElement('div');
    el.id = 'emailMsg';
    wrap.appendChild(el);
  }
  const isSuccess = type === 'success';
  el.style.cssText = 'margin-top:10px;padding:10px 14px;border-radius:8px;font-size:12.5px;line-height:1.6;' +
    (isSuccess
      ? 'background:rgba(16,185,129,.1);border:.5px solid rgba(16,185,129,.25);color:#6ee7b7'
      : 'background:rgba(255,107,107,.1);border:.5px solid rgba(255,107,107,.25);color:#fca5a5');
  el.innerHTML = html;
}

async function getPDFBase64() {
  return new Promise((resolve) => {
    try {
      const d = resultData;
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
      // Versão simplificada para email — conteúdo completo em texto
      const W = 210, M = 18;
      let y = 22;
      doc.setFillColor(12,12,24); doc.rect(0,0,W,297,'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(18); doc.setTextColor(242,242,255);
      doc.text('MSC — Diagnóstico Completo', M, y); y += 10;
      doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(160,160,200);
      doc.text(d.nome || 'Candidato', M, y); y += 7;
      doc.setFontSize(9); doc.setTextColor(100,100,140);
      doc.text('Para o diagnóstico completo e interativo, acesse:', M, y); y += 5;
      const link = 'https://msc-carreira.vercel.app/msc_resultado_pago.html?email=' + encodeURIComponent(document.getElementById('emailReenvio')?.value || '');
      doc.setTextColor(124,58,237);
      doc.text(link, M, y); y += 12;

      // Score
      doc.setFont('helvetica','bold'); doc.setFontSize(28); doc.setTextColor(255,107,107);
      doc.text(String(d.score_total || 0), M, y); y += 8;
      doc.setFontSize(10); doc.setTextColor(200,180,255);
      doc.text('Nível ' + (d.nivel||'Prata') + ' — acima de ' + (d.percentil||60) + '% dos perfis', M, y); y += 10;

      // Resumo
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(160,160,190);
      const resumo = doc.splitTextToSize(d.resumo_livre || '', W-2*M);
      resumo.forEach(l => { doc.text(l, M, y); y += 5; }); y += 4;

      // Scores
      doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(160,100,255);
      doc.text('SCORES', M, y); y += 6;
      const sc = d.scores || {};
      const lbs = ['Clareza e estrutura','Comunicação de impacto','Aderência técnica','Branding pessoal','Atualização profissional','Posicionamento'];
      const keys = ['clareza_estrutura','comunicacao_impacto','aderencia_tecnica','branding_pessoal','atualizacao','posicionamento'];
      keys.forEach((k,i) => {
        doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(160,160,190);
        doc.text(lbs[i] + ': ' + (sc[k]||0) + '/100', M, y); y += 5;
      }); y += 4;

      // Bloqueios
      if (y > 220) { doc.addPage(); doc.setFillColor(12,12,24); doc.rect(0,0,W,297,'F'); y = 22; }
      doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(255,107,107);
      doc.text('BLOQUEIOS IDENTIFICADOS', M, y); y += 6;
      (d.bloqueios||[]).forEach((b,i) => {
        doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(255,150,150);
        doc.text((i+1)+'. '+b.titulo, M, y); y += 5;
        doc.setFont('helvetica','normal'); doc.setTextColor(160,160,190);
        const bl = doc.splitTextToSize(b.descricao||'', W-2*M);
        bl.forEach(l => { if(y>270){doc.addPage();doc.setFillColor(12,12,24);doc.rect(0,0,W,297,'F');y=22;} doc.text(l,M,y); y+=5; }); y+=3;
      });

      // Plano
      if (y > 220) { doc.addPage(); doc.setFillColor(12,12,24); doc.rect(0,0,W,297,'F'); y = 22; }
      doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(100,200,255);
      doc.text('PLANO DE AÇÃO', M, y); y += 6;
      (d.plano_acao||[]).forEach(p => {
        doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(100,200,255);
        doc.text(p.periodo, M, y); y += 5;
        doc.setFont('helvetica','bold'); doc.setTextColor(242,242,255);
        doc.text(p.titulo, M, y); y += 5;
        doc.setFont('helvetica','normal'); doc.setTextColor(160,160,190);
        const pl = doc.splitTextToSize(p.descricao||'', W-2*M);
        pl.forEach(l => { if(y>270){doc.addPage();doc.setFillColor(12,12,24);doc.rect(0,0,W,297,'F');y=22;} doc.text(l,M,y); y+=5; }); y+=4;
      });

      // Frase
      if (y > 240) { doc.addPage(); doc.setFillColor(12,12,24); doc.rect(0,0,W,297,'F'); y = 22; }
      doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(160,100,255);
      doc.text('FRASE DE POSICIONAMENTO', M, y); y += 6;
      doc.setFont('helvetica','italic'); doc.setFontSize(9); doc.setTextColor(180,160,255);
      const fl = doc.splitTextToSize('"'+(d.frase_posicionamento||'')+'"', W-2*M);
      fl.forEach(l => { doc.text(l,M,y); y+=5; });

      const pdfData = doc.output('datauristring');
      const base64 = pdfData.split(',')[1];
      resolve(base64);
    } catch(e) {
      console.error('PDF base64 error:', e);
      resolve('');
    }
  });
}
